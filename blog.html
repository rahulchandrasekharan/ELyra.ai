<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Elyra AI Solutions</title>
<meta name="description" content="Read the latest insights on AI, ERP, CRM, LMS, web development and SEO from the Elyra AI Solutions team.">
<meta name="keywords" content="AI blog, enterprise software, ERP insights, CRM tips, SEO strategy, LMS, web development, Elyra AI">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="Blog — Elyra AI Solutions">
<meta property="og:description" content="Latest insights on AI, enterprise software, CRM, LMS, ERP and SEO from Elyra AI Solutions.">
<meta property="og:image" content="/Elyra Ai solution.png">
<meta property="og:url" content="https://elyraai.com/blog.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://elyraai.com/blog.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04050a;--green:#00c896;--green-bright:#00e676;--dim:rgba(0,200,150,.45);--border:rgba(0,200,150,.14);--glass:rgba(4,14,10,.72)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:rgba(255,255,255,.88);font-family:'Segoe UI',Arial,sans-serif;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:64px;background:rgba(4,5,10,.88);border-bottom:1px solid var(--border);backdrop-filter:blur(14px)}
.nav-logo{font-size:13px;letter-spacing:5px;font-weight:300;color:#fff;text-transform:uppercase;text-decoration:none}
.nav-logo span{color:var(--green-bright)}
.nav-back{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 20px;border:1px solid var(--border);color:var(--green);text-decoration:none;border-radius:2px;transition:border-color .25s,background .25s}
.nav-back:hover{border-color:var(--green);background:rgba(0,200,150,.08)}

.page-hero{position:relative;z-index:2;padding:140px 60px 60px;max-width:1160px;margin:0 auto}
.page-tag{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--green);margin-bottom:14px}
.page-title{font-size:clamp(32px,5vw,64px);font-weight:200;letter-spacing:3px;text-transform:uppercase;line-height:1.1}
.page-title strong{color:var(--green-bright);font-weight:600}
.page-rule{width:160px;height:1px;background:linear-gradient(90deg,var(--green),transparent);margin:24px 0 48px}

.blog-main{position:relative;z-index:2;padding:0 60px 80px;max-width:1160px;margin:0 auto}
@media(max-width:760px){.page-hero,.blog-main{padding-left:20px;padding-right:20px}nav{padding:0 20px}}

/* featured */
.featured{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
@media(max-width:768px){.featured{grid-template-columns:1fr}}
.feat-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .3s}
.feat-card:hover{border-color:rgba(0,200,150,.35)}
.feat-thumb{height:180px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;border-bottom:1px solid var(--border)}
.feat-thumb::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,200,150,.12),transparent 70%)}
.feat-body{padding:24px}
.feat-tag{font-size:9px;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:10px}
.feat-title{font-size:17px;font-weight:600;letter-spacing:.5px;margin-bottom:10px;color:rgba(255,255,255,.9);line-height:1.4}
.feat-excerpt{font-size:12.5px;color:rgba(255,255,255,.55);line-height:1.85;margin-bottom:14px}
.feat-meta{font-size:10px;letter-spacing:1px;color:var(--dim);display:flex;gap:16px}

/* grid */
.blogs-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--green);margin-bottom:20px}
.blogs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.blogs-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.blogs-grid{grid-template-columns:1fr}}
.blog-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .3s,transform .25s}
.blog-card:hover{border-color:rgba(0,200,150,.3);transform:translateY(-4px)}
.blog-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid var(--border);position:relative}
.blog-thumb::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,200,150,.1),transparent 70%)}
.blog-body{padding:16px}
.blog-cat{font-size:9px;letter-spacing:2.5px;color:var(--green);text-transform:uppercase;margin-bottom:7px}
.blog-title{font-size:13px;font-weight:600;letter-spacing:.4px;margin-bottom:8px;color:rgba(255,255,255,.85);line-height:1.45}
.blog-excerpt{font-size:11.5px;color:rgba(255,255,255,.5);line-height:1.75;margin-bottom:10px}
.blog-meta{font-size:9.5px;letter-spacing:1px;color:var(--dim);display:flex;gap:14px}

/* loading / empty */
.loading{text-align:center;padding:60px 0;color:rgba(255,255,255,.3);font-size:12px;letter-spacing:3px;text-transform:uppercase}
.loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite;margin:0 3px}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.empty{text-align:center;padding:60px 0;color:rgba(255,255,255,.3);font-size:12px;letter-spacing:2px}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,5,10,.92);z-index:500;overflow-y:auto;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:60px 20px 40px}
.modal{background:#070d0a;border:1px solid var(--border);border-radius:12px;max-width:760px;width:100%;padding:40px;position:relative}
.modal-close{position:absolute;top:20px;right:20px;background:none;border:1px solid var(--border);color:var(--green);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s}
.modal-close:hover{border-color:var(--green);background:rgba(0,200,150,.1)}
.modal-tag{font-size:9px;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:12px}
.modal-title{font-size:clamp(20px,3vw,30px);font-weight:300;letter-spacing:1px;margin-bottom:16px;line-height:1.3;color:rgba(255,255,255,.95)}
.modal-meta{font-size:10px;letter-spacing:1px;color:var(--dim);display:flex;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.modal-content{font-size:14px;line-height:1.9;color:rgba(255,255,255,.75);white-space:pre-wrap}

/* ai badge */
.ai-badge{display:inline-block;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border:1px solid rgba(0,200,150,.3);border-radius:10px;color:var(--green);margin-left:8px;vertical-align:middle}

footer{position:relative;z-index:2;border-top:1px solid var(--border);padding:28px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
@media(max-width:760px){footer{padding:24px 20px;flex-direction:column;text-align:center}}
.foot-copy{font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,.18)}
.foot-brand{font-size:10px;letter-spacing:2px;color:var(--dim)}

::selection{background:rgba(0,200,150,.3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav>
  <a class="nav-logo" href="main.html">Elyra <span>AI</span> Solutions</a>
  <a class="nav-back" href="main.html">← Back to Home</a>
</nav>

<div class="page-hero">
  <p class="page-tag">Latest Insights</p>
  <h1 class="page-title">From the <strong>Blog</strong></h1>
  <div class="page-rule"></div>
</div>

<div class="blog-main">
  <div id="featured-section">
    <div class="featured" id="featured-grid">
      <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    </div>
  </div>

  <p class="blogs-label" id="all-label" style="display:none">All Articles</p>
  <div class="blogs-grid" id="blogs-grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-tag" id="modal-cat"></div>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<footer>
  <span class="foot-copy">© 2025 Elyra AI Solutions. All rights reserved.</span>
  <span class="foot-brand">Intelligence · Innovation · Impact</span>
</footer>

<script>
const API = '/api';

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
}

function thumbBg() {
  return 'background:linear-gradient(135deg,#040e08,#0a2018)';
}

async function openPost(slug) {
  try {
    const res = await fetch(`${API}/blogs/${slug}`);
    const { blog } = await res.json();
    document.getElementById('modal-cat').textContent = blog.category;
    document.getElementById('modal-title').innerHTML = blog.title + (blog.aiGenerated ? '<span class="ai-badge">AI</span>' : '');
    document.getElementById('modal-meta').innerHTML = `<span>${formatDate(blog.publishedAt)}</span><span>${blog.readTime}</span>`;
    document.getElementById('modal-content').textContent = blog.content;
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  } catch (e) {
    alert('Could not load post.');
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function makeFeatCard(blog) {
  const div = document.createElement('div');
  div.className = 'feat-card';
  div.innerHTML = `
    <div class="feat-thumb" style="${thumbBg()}">
      <span style="position:relative;z-index:1">${blog.emoji || '🧠'}</span>
    </div>
    <div class="feat-body">
      <div class="feat-tag">${blog.category}${blog.aiGenerated ? '<span class="ai-badge">AI</span>' : ''}</div>
      <div class="feat-title">${blog.title}</div>
      <p class="feat-excerpt">${blog.excerpt}</p>
      <div class="feat-meta"><span>${formatDate(blog.publishedAt)}</span><span>${blog.readTime}</span></div>
    </div>`;
  div.addEventListener('click', () => openPost(blog.slug));
  return div;
}

function makeBlogCard(blog) {
  const div = document.createElement('div');
  div.className = 'blog-card';
  div.innerHTML = `
    <div class="blog-thumb" style="${thumbBg()}">
      <span style="position:relative;z-index:1">${blog.emoji || '🧠'}</span>
    </div>
    <div class="blog-body">
      <div class="blog-cat">${blog.category}${blog.aiGenerated ? '<span class="ai-badge">AI</span>' : ''}</div>
      <div class="blog-title">${blog.title}</div>
      <p class="blog-excerpt">${blog.excerpt}</p>
      <div class="blog-meta"><span>${formatDate(blog.publishedAt)}</span><span>${blog.readTime}</span></div>
    </div>`;
  div.addEventListener('click', () => openPost(blog.slug));
  return div;
}

async function loadBlogs() {
  const featGrid = document.getElementById('featured-grid');
  const blogsGrid = document.getElementById('blogs-grid');
  try {
    const res = await fetch(`${API}/blogs?limit=20`);
    const { blogs } = await res.json();

    featGrid.innerHTML = '';

    if (!blogs || blogs.length === 0) {
      featGrid.innerHTML = '<div class="empty" style="grid-column:1/-1">No posts yet. Check back soon.</div>';
      return;
    }

    const featured = blogs.slice(0, 2);
    const rest = blogs.slice(2);

    featured.forEach(b => featGrid.appendChild(makeFeatCard(b)));

    if (rest.length > 0) {
      document.getElementById('all-label').style.display = 'block';
      rest.forEach(b => blogsGrid.appendChild(makeBlogCard(b)));
    }
  } catch (e) {
    featGrid.innerHTML = '<div class="empty" style="grid-column:1/-1">Could not connect to server.</div>';
  }
}

loadBlogs();
</script>

<script>
(function(){
  const cv=document.getElementById('bg-canvas');
  const cx=cv.getContext('2d');
  let W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function drawEye(x,y,size,alpha,rot,ph){
    cx.save();cx.translate(x,y);cx.rotate(rot);
    const hw=size/2,hh=size*.22;
    cx.beginPath();cx.moveTo(-hw,0);cx.quadraticCurveTo(0,-hh*2.1,hw,0);cx.quadraticCurveTo(0,hh*2.1,-hw,0);
    cx.strokeStyle=`rgba(0,200,150,${alpha*.55})`;cx.lineWidth=1.1;cx.stroke();
    const iR=hh*.88;
    [.28,.6,1].forEach((f,i)=>{cx.beginPath();cx.arc(0,0,iR*f,0,Math.PI*2);cx.strokeStyle=`rgba(0,200,150,${alpha*[.55,.38,.22][i]})`;cx.lineWidth=i===0?.8:.55;cx.stroke();});
    const pg=cx.createRadialGradient(0,0,0,0,0,iR*.22);
    pg.addColorStop(0,`rgba(0,230,118,${alpha*(.45+.3*Math.sin(ph))})`);pg.addColorStop(1,'rgba(0,230,118,0)');
    cx.beginPath();cx.arc(0,0,iR*.22,0,Math.PI*2);cx.fillStyle=pg;cx.fill();
    const tX=hw*.52,tLen=size*.14;
    [-hh*.55,-hh*.2,hh*.2,hh*.55].forEach(ty=>[-1,1].forEach(side=>{
      const ox=side*tX,bend=ty<0?-hh*.12:hh*.12;
      cx.beginPath();cx.moveTo(ox,ty);cx.lineTo(ox+side*tLen,ty);cx.strokeStyle=`rgba(0,200,150,${alpha*.45})`;cx.lineWidth=.7;cx.stroke();
      cx.beginPath();cx.moveTo(ox+side*tLen,ty);cx.lineTo(ox+side*tLen,ty+bend);cx.stroke();
      cx.beginPath();cx.arc(ox+side*tLen,ty+bend,1.4,0,Math.PI*2);cx.fillStyle=`rgba(0,230,118,${alpha*.65})`;cx.fill();
    }));
    const scanY=hh*.75*Math.sin(ph*.7);
    const clampX=hw*.82*Math.sqrt(Math.max(0,1-(scanY/(hh*1.05))**2));
    cx.beginPath();cx.moveTo(-clampX,scanY);cx.lineTo(clampX,scanY);
    cx.strokeStyle=`rgba(0,230,118,${alpha*.3*(.5+.5*Math.cos(ph*.7))})`;cx.lineWidth=.8;cx.stroke();
    cx.restore();
  }
  const EYES=[
    {xr:.5,yr:.35,sizer:.48,baseA:.12,rot:0,rotSpd:.00008,ph:0,phSpd:.009},
    {xr:.1,yr:.2,sizer:.2,baseA:.08,rot:.15,rotSpd:-.00012,ph:2,phSpd:.011},
    {xr:.9,yr:.78,sizer:.18,baseA:.07,rot:-.1,rotSpd:.00015,ph:1,phSpd:.010},
    {xr:.85,yr:.12,sizer:.13,baseA:.06,rot:.08,rotSpd:-.0001,ph:3.5,phSpd:.013},
    {xr:.15,yr:.88,sizer:.12,baseA:.05,rot:-.05,rotSpd:.00013,ph:5,phSpd:.012},
  ];
  let PARTS=[];
  function buildParts(){PARTS=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.18,vy:-(Math.random()*.35+.08),r:Math.random()*1.1+.25,ph:Math.random()*Math.PI*2,ps:.018+Math.random()*.022,green:Math.random()>.7}));}
  buildParts();window.addEventListener('resize',buildParts);
  let tick=0;
  function frame(){
    cx.clearRect(0,0,W,H);
    const rg=cx.createRadialGradient(W/2,H*.35,0,W/2,H*.35,W*.6);
    rg.addColorStop(0,'rgba(0,55,26,.11)');rg.addColorStop(.7,'rgba(0,18,8,.04)');rg.addColorStop(1,'transparent');
    cx.fillStyle=rg;cx.fillRect(0,0,W,H);
    tick++;
    const rx=W/2,ry=H*.35,rayRot=tick*.00025;
    for(let i=0;i<6;i++){const ang=rayRot+(i/6)*Math.PI*2;const len=Math.min(W,H)*.72;const ex=rx+Math.cos(ang)*len,ey=ry+Math.sin(ang)*len;const spread=len*.06;const px=-Math.sin(ang)*spread,py=Math.cos(ang)*spread;cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(ex+px,ey+py);cx.lineTo(ex-px,ey-py);cx.closePath();const rg2=cx.createLinearGradient(rx,ry,ex,ey);rg2.addColorStop(0,'rgba(0,200,150,.055)');rg2.addColorStop(.4,'rgba(0,200,150,.018)');rg2.addColorStop(1,'rgba(0,200,150,0)');cx.fillStyle=rg2;cx.fill();}
    EYES.forEach(e=>{e.ph+=e.phSpd;e.rot+=e.rotSpd;drawEye(e.xr*W,e.yr*H,e.sizer*Math.min(W,H),e.baseA*(.75+.25*Math.sin(e.ph*.4)),e.rot,e.ph);});
    PARTS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=p.ps;if(p.y<-4){p.y=H+4;p.x=Math.random()*W;}const a=(p.green?.18:.1)*(.5+.5*Math.sin(p.ph));cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=p.green?`rgba(0,230,118,${a})`:`rgba(0,200,150,${a})`;cx.fill();});
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
